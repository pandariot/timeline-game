<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before & After</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #1a1132;
    --card: #2d1f5e;
    --accent1: #ff6b9d;
    --accent2: #c084fc;
    --accent3: #67e8f9;
    --accent4: #fbbf24;
    --accent5: #34d399;
    --success: #34d399;
    --wrong: #ff6b6b;
    --text: #f8fafc;
    --text-muted: #a78bfa;
    --dropzone: #3b2a6e;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(145deg, var(--bg) 0%, #2d1b69 50%, var(--bg) 100%);
    font-family: 'Fredoka', 'Nunito', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes confettiFall { 
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; } 
    100% { transform: translateY(100vh) translateX(var(--x-drift)) rotate(720deg); opacity: 0; } 
  }
  @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-10px); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 40% { transform: translateX(5px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
  @keyframes wiggle { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-3deg); } 75% { transform: rotate(3deg); } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }

  .screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

  .title-gradient {
    font-family: 'Fredoka', sans-serif;
    font-size: 44px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .btn-primary {
    font-family: 'Fredoka', sans-serif;
    font-size: 20px;
    font-weight: 600;
    padding: 16px 48px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(255, 107, 157, 0.4);
    transition: transform 0.15s;
  }
  .btn-primary:active { transform: scale(0.95); }
  .btn-primary.pulse { animation: pulse 2s ease-in-out infinite; }

  .btn-secondary {
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    font-weight: 600;
    padding: 14px 40px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(192, 132, 252, 0.3);
  }

  .btn-check {
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    font-weight: 600;
    padding: 14px 40px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, var(--accent4), var(--accent1));
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(251, 191, 36, 0.3);
    transition: all 0.3s ease;
  }
  .btn-check.disabled {
    background: #3b2a6e;
    color: #666;
    cursor: default;
    box-shadow: none;
    transform: scale(0.95);
  }

  /* Game layout */
  .game-wrap { max-width: 520px; margin: 0 auto; text-align: center; padding: 24px 16px 40px; }

  .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .header-label { font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .header-score { font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--accent4); font-weight: 700; }

  .progress-bar { width: 100%; height: 4px; border-radius: 2px; background: #3b2a6e; margin-bottom: 20px; }
  .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent1), var(--accent2)); transition: width 0.5s ease; }

  .round-title { font-family: 'Fredoka', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 6px; animation: slideUp 0.4s ease-out; }
  .round-hint { font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-muted); margin-bottom: 28px; }

  /* Timeline */
  .timeline-labels { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 10px; }
  .label-early { font-size: 12px; color: var(--accent3); font-weight: 700; font-family: 'Nunito'; }
  .label-late { font-size: 12px; color: var(--accent1); font-weight: 700; font-family: 'Nunito'; }
  .label-line { flex: 1; max-width: 200px; height: 2px; background: linear-gradient(90deg, rgba(103,232,249,0.4), rgba(255,107,157,0.4)); border-radius: 1px; }

  .slots-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }

  .slot {
    width: 88px; height: 104px; border-radius: 18px;
    border: 2px dashed #4a3a7a;
    background: rgba(59, 42, 110, 0.55);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; transition: all 0.2s ease;
  }
  .slot.filled { background: var(--card); cursor: pointer; }
  .slot.hover { transform: scale(1.08); border-color: var(--accent2); background: rgba(192,132,252,0.15); }
  .slot.correct { border-color: var(--success); background: rgba(52,211,153,0.13); }
  .slot.wrong { border-color: var(--wrong); background: rgba(255,107,107,0.13); }
  .slot.anim-bounce { animation: bounce 0.5s ease; }
  .slot.anim-shake { animation: shake 0.4s ease; }
  .slot.anim-pop { animation: popIn 0.25s ease-out; }

  .slot-number {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    border-radius: 10px; padding: 1px 8px;
    font-size: 11px; font-weight: 700; color: #fff; font-family: 'Nunito';
  }
  .slot-emoji { font-size: 32px; margin-bottom: 4px; cursor: grab; }
  .slot-label { font-size: 10px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.2; font-family: 'Nunito'; padding: 0 4px; }
  .slot-year { font-size: 10px; font-weight: 700; margin-top: 2px; font-family: 'Nunito'; }
  .slot-placeholder { font-size: 22px; opacity: 0.3; }

  /* Pool */
  .pool {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    min-height: 90px; padding: 16px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 24px;
  }
  .pool-empty {
    padding: 16px; border-radius: 20px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 24px; color: var(--text-muted); font-size: 14px; font-family: 'Nunito';
  }

  .pool-card {
    width: 80px; height: 90px; border-radius: 16px;
    background: var(--card); border: 2px solid rgba(192,132,252,0.27);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: grab; animation: wiggle 2s ease-in-out infinite;
    transition: all 0.15s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .pool-card:hover { transform: scale(1.08) rotate(-2deg); border-color: var(--accent2); }
  .pool-card .card-emoji { font-size: 30px; margin-bottom: 4px; }
  .pool-card .card-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-align: center; line-height: 1.2; font-family: 'Nunito'; padding: 0 4px; }

  .result-text { font-family: 'Fredoka', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 16px; animation: slideUp 0.3s ease-out; }
  .result-wrap { animation: slideUp 0.3s ease-out; }

  /* Drag ghost */
  .drag-ghost {
    position: fixed; width: 72px; height: 72px; border-radius: 20px;
    background: var(--card); display: flex; align-items: center; justify-content: center;
    font-size: 36px; z-index: 1000; pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    border: 2px solid var(--accent2); opacity: 0.9;
  }

  /* Confetti */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
  .confetti-piece { position: absolute; border-radius: 50%; }

  /* End screen */
  .end-score-bar { width: 200px; height: 8px; border-radius: 4px; background: #3b2a6e; margin: 16px auto 32px; overflow: hidden; }
  .end-score-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent1), var(--accent4)); transition: width 1s ease-out; }
</style>
</head>
<body>

<div id="app"></div>

<script>
const ROUNDS = [
  {
    theme: "Viral Food Trends",
    hint: "When did these blow up?",
    items: [
      { emoji: "🧁", label: "Cupcake Craze", year: 2009 },
      { emoji: "🥐", label: "Cronuts", year: 2013 },
      { emoji: "🥑", label: "Avocado Toast Era", year: 2015 },
      { emoji: "☕", label: "Dalgona Coffee", year: 2020 },
      { emoji: "🍫", label: "Dubai Chocolate", year: 2024 },
    ],
  },
  {
    theme: "Toy & Fad Frenzy",
    hint: "Drag these obsessions into order!",
    items: [
      { emoji: "🧸", label: "Beanie Babies", year: 1995 },
      { emoji: "🐣", label: "Furby", year: 1998 },
      { emoji: "🔵", label: "Bakugan", year: 2008 },
      { emoji: "🌀", label: "Fidget Spinners", year: 2017 },
      { emoji: "🫧", label: "Pop Its", year: 2021 },
    ],
  },
  {
    theme: "Viral Internet Moments",
    hint: "When did the internet lose its mind?",
    items: [
      { emoji: "🐱", label: "Keyboard Cat", year: 2009 },
      { emoji: "🕺", label: "Gangnam Style", year: 2012 },
      { emoji: "🧊", label: "Ice Bucket Challenge", year: 2014 },
      { emoji: "🍾", label: "Bottle Flip", year: 2016 },
      { emoji: "💃", label: "Renegade Dance", year: 2020 },
    ],
  },
  {
    theme: "App Takeovers",
    hint: "Which app ruled first?",
    items: [
      { emoji: "📱", label: "Angry Birds", year: 2009 },
      { emoji: "📸", label: "Instagram", year: 2010 },
      { emoji: "👻", label: "Snapchat", year: 2012 },
      { emoji: "🎵", label: "Musical.ly", year: 2014 },
      { emoji: "🤖", label: "ChatGPT", year: 2022 },
    ],
  },
  {
    theme: "Sneaker & Style Waves",
    hint: "Which trend stomped in first?",
    items: [
      { emoji: "👟", label: "Air Jordans Retro Hype", year: 2001 },
      { emoji: "🩴", label: "Crocs Go Mainstream", year: 2007 },
      { emoji: "🧦", label: "Yeezys Drop", year: 2015 },
      { emoji: "☁️", label: "Cloud Shoes (On/Hoka)", year: 2020 },
      { emoji: "🥿", label: "Ballet Flats Comeback", year: 2023 },
    ],
  },
];

const SLOT_COLORS = ["#ff6b9d", "#c084fc", "#67e8f9", "#fbbf24", "#34d399"];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Game State
let state = {
  screen: "start", // start | game | end
  roundIndex: 0,
  pool: [],
  slots: [null, null, null, null, null],
  checked: false,
  results: [],
  score: 0,
  totalScore: 0,
  dragItem: null,
  dragSource: null,
  hoverSlot: null,
  isDragging: false,
  dragPos: { x: 0, y: 0 },
};

function initRound(idx) {
  const r = ROUNDS[idx];
  const sorted = [...r.items].sort((a, b) => a.year - b.year);
  state.pool = shuffle(sorted.map((item, i) => ({ ...item, correctIndex: i, id: `item-${i}` })));
  state.slots = [null, null, null, null, null];
  state.checked = false;
  state.results = [];
  state.score = 0;
}

function allPlaced() {
  return state.slots.every(s => s !== null);
}

// Rendering
function render() {
  const app = document.getElementById("app");
  if (state.screen === "start") return renderStart(app);
  if (state.screen === "end") return renderEnd(app);
  renderGame(app);
}

function renderStart(app) {
  app.innerHTML = `
    <div class="screen">
      <div style="text-align:center;max-width:460px">
        <div style="font-size:72px;animation:float 3s ease-in-out infinite;margin-bottom:20px">⏳</div>
        <h1 class="title-gradient">Before & After</h1>
        <p style="color:var(--text-muted);font-size:17px;line-height:1.5;margin-bottom:36px;font-family:'Nunito',sans-serif">
          Drag the icons into the right order — earliest to latest. Think you know when things went viral?
        </p>
        <button class="btn-primary pulse" onclick="startGame()">Let's Go!</button>
        <div style="margin-top:28px;color:var(--text-muted);font-size:13px;opacity:0.6;font-family:'Nunito',sans-serif">
          ${ROUNDS.length} rounds • 5 items each
        </div>
      </div>
    </div>`;
}

function renderEnd(app) {
  const max = ROUNDS.length * 5;
  const pct = Math.round((state.totalScore / max) * 100);
  const msg = pct === 100 ? "Time Lord! 🏆" : pct >= 80 ? "History buff! 🔥" : pct >= 60 ? "Not bad! 🙌" : pct >= 40 ? "Getting there! 🤔" : "Time is a mystery 😅";
  const icon = pct === 100 ? "👑" : pct >= 60 ? "⭐" : "⏳";

  app.innerHTML = `
    <div class="screen">
      ${pct >= 80 ? confettiHTML() : ""}
      <div style="text-align:center;animation:bounceIn 0.5s ease-out">
        <div style="font-size:64px;margin-bottom:16px">${icon}</div>
        <h1 style="font-family:'Fredoka',sans-serif;font-size:36px;font-weight:700;color:var(--text);margin-bottom:8px">${msg}</h1>
        <p style="font-family:'Nunito',sans-serif;font-size:22px;color:var(--text-muted);margin-bottom:8px">${state.totalScore} / ${max} correct</p>
        <div class="end-score-bar"><div class="end-score-fill" style="width:${pct}%"></div></div>
        <button class="btn-primary" onclick="restart()">Play Again</button>
      </div>
    </div>`;
}

function renderGame(app) {
  const round = ROUNDS[state.roundIndex];

  let slotsHTML = state.slots.map((item, i) => {
    const isHover = state.hoverSlot === i && state.isDragging;
    const isCorrect = state.checked && state.results[i];
    const isWrong = state.checked && !state.results[i] && item;

    let classes = "slot";
    if (item) classes += " filled";
    if (isHover) classes += " hover";
    if (isCorrect) classes += " correct";
    if (isWrong) classes += " wrong";

    const borderColor = isCorrect ? "var(--success)" : isWrong ? "var(--wrong)" : isHover ? "var(--accent2)" : item ? SLOT_COLORS[i] + "88" : "#4a3a7a";
    const numBg = isCorrect ? "var(--success)" : isWrong ? "var(--wrong)" : SLOT_COLORS[i];

    let inner = "";
    if (item) {
      inner = `
        <div class="slot-emoji" draggable="${!state.checked}" 
          ondragstart="onSlotDragStart(event, ${i})"
          ontouchstart="onSlotTouchStart(event, ${i})">${item.emoji}</div>
        <div class="slot-label">${item.label}</div>
        ${state.checked ? `<div class="slot-year" style="color:${isCorrect ? 'var(--success)' : 'var(--wrong)'}">${item.year}</div>` : ""}`;
    } else {
      inner = `<div class="slot-placeholder">?</div>`;
    }

    return `<div class="${classes}" style="border-color:${borderColor}" 
      data-slot-index="${i}"
      ondragover="onSlotDragOver(event, ${i})" 
      ondragleave="onSlotDragLeave(event)" 
      ondrop="onSlotDrop(event, ${i})"
      onclick="${!state.checked && item ? `returnToPool(${i})` : ''}">
      <div class="slot-number" style="background:${numBg}">${i + 1}</div>
      ${inner}
    </div>`;
  }).join("");

  let poolHTML = "";
  if (state.pool.length > 0) {
    const cards = state.pool.map((item, i) => `
      <div class="pool-card" draggable="true" 
        ondragstart="onPoolDragStart(event, ${i})"
        ontouchstart="onPoolTouchStart(event, ${i})">
        <div class="card-emoji">${item.emoji}</div>
        <div class="card-label">${item.label}</div>
      </div>`).join("");
    poolHTML = `<div class="pool">${cards}</div>`;
  } else if (!state.checked) {
    poolHTML = `<div class="pool-empty">All placed! Tap a slot to remove, or check your answer ↓</div>`;
  }

  let buttonHTML = "";
  if (!state.checked) {
    const canCheck = allPlaced();
    buttonHTML = `<button class="btn-check ${canCheck ? '' : 'disabled'}" ${canCheck ? 'onclick="checkAnswers()"' : ''}>Check It! ✨</button>`;
  } else {
    const sc = state.score;
    const color = sc === 5 ? "var(--success)" : sc >= 3 ? "var(--accent4)" : "var(--accent1)";
    const msg = sc === 5 ? "Perfect! 🎉" : sc >= 3 ? `${sc}/5 — Nice! 👏` : `${sc}/5 — Tricky! 😬`;
    const btnText = state.roundIndex < ROUNDS.length - 1 ? "Next Round →" : "See Results 🏆";
    buttonHTML = `<div class="result-wrap">
      <div class="result-text" style="color:${color}">${msg}</div>
      <button class="btn-secondary" onclick="nextRound()">${btnText}</button>
    </div>`;
  }

  app.innerHTML = `
    <div id="confetti-container"></div>
    <div id="drag-ghost" class="drag-ghost" style="display:none"></div>
    <div class="game-wrap" ontouchmove="onTouchMove(event)" ontouchend="onTouchEnd(event)">
      <div class="header-row">
        <span class="header-label">Round ${state.roundIndex + 1} / ${ROUNDS.length}</span>
        <span class="header-score">Score: ${state.totalScore}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(state.roundIndex / ROUNDS.length) * 100}%"></div></div>
      <h2 class="round-title">${round.theme}</h2>
      <p class="round-hint">${round.hint}</p>
      <div style="margin-bottom:28px">
        <div class="timeline-labels">
          <span class="label-early">EARLIEST</span>
          <div class="label-line"></div>
          <span class="label-late">LATEST</span>
        </div>
        <div class="slots-row">${slotsHTML}</div>
      </div>
      ${poolHTML}
      ${buttonHTML}
    </div>`;
}

function confettiHTML() {
  let pieces = "";
  for (let i = 0; i < 40; i++) {
    const x = Math.random() * 100;
    const delay = Math.random() * 0.3;
    const dur = 0.8 + Math.random() * 0.6;
    const color = SLOT_COLORS[Math.floor(Math.random() * SLOT_COLORS.length)];
    const size = 4 + Math.random() * 8;
    const rot = Math.random() * 360;
    const drift = (Math.random() - 0.5) * 120;
    pieces += `<div style="position:absolute;left:${x}%;top:-5%;width:${size}px;height:${size * 1.3}px;background:${color};border-radius:${size < 7 ? '50%' : '2px'};animation:confettiFall ${dur}s ${delay}s ease-in forwards;transform:rotate(${rot}deg);--x-drift:${drift}px"></div>`;
  }
  return `<div class="confetti-wrap">${pieces}</div>`;
}

// Drag & Drop handlers (HTML5 + touch)
function onPoolDragStart(e, poolIdx) {
  if (state.checked) return;
  state.dragItem = state.pool[poolIdx];
  state.dragSource = { type: "pool", index: poolIdx };
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", "");
}

function onSlotDragStart(e, slotIdx) {
  if (state.checked) return;
  state.dragItem = state.slots[slotIdx];
  state.dragSource = { type: "slot", index: slotIdx };
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", "");
}

function onSlotDragOver(e, slotIdx) {
  e.preventDefault();
  if (state.hoverSlot !== slotIdx) {
    state.hoverSlot = slotIdx;
    render();
  }
}

function onSlotDragLeave(e) {
  state.hoverSlot = null;
  render();
}

function onSlotDrop(e, slotIdx) {
  e.preventDefault();
  handleDrop(slotIdx);
  state.hoverSlot = null;
  state.dragItem = null;
  state.dragSource = null;
  render();
}

// Touch handlers
function onPoolTouchStart(e, poolIdx) {
  if (state.checked) return;
  e.preventDefault();
  state.dragItem = state.pool[poolIdx];
  state.dragSource = { type: "pool", index: poolIdx };
  state.isDragging = true;
  const t = e.touches[0];
  state.dragPos = { x: t.clientX, y: t.clientY };
  showGhost(state.dragItem.emoji, t.clientX, t.clientY);
}

function onSlotTouchStart(e, slotIdx) {
  if (state.checked) return;
  e.preventDefault();
  state.dragItem = state.slots[slotIdx];
  state.dragSource = { type: "slot", index: slotIdx };
  state.isDragging = true;
  const t = e.touches[0];
  state.dragPos = { x: t.clientX, y: t.clientY };
  showGhost(state.dragItem.emoji, t.clientX, t.clientY);
}

function onTouchMove(e) {
  if (!state.isDragging) return;
  e.preventDefault();
  const t = e.touches[0];
  state.dragPos = { x: t.clientX, y: t.clientY };
  moveGhost(t.clientX, t.clientY);

  const el = document.elementFromPoint(t.clientX, t.clientY);
  const slotEl = el ? el.closest("[data-slot-index]") : null;
  const newHover = slotEl ? parseInt(slotEl.dataset.slotIndex) : null;
  if (newHover !== state.hoverSlot) {
    state.hoverSlot = newHover;
    render();
    showGhost(state.dragItem.emoji, t.clientX, t.clientY);
  }
}

function onTouchEnd(e) {
  if (!state.isDragging) return;
  if (state.hoverSlot !== null) {
    handleDrop(state.hoverSlot);
  }
  hideGhost();
  state.isDragging = false;
  state.dragItem = null;
  state.dragSource = null;
  state.hoverSlot = null;
  render();
}

function showGhost(emoji, x, y) {
  const g = document.getElementById("drag-ghost");
  if (!g) return;
  g.textContent = emoji;
  g.style.display = "flex";
  g.style.left = (x - 36) + "px";
  g.style.top = (y - 36) + "px";
}

function moveGhost(x, y) {
  const g = document.getElementById("drag-ghost");
  if (!g) return;
  g.style.left = (x - 36) + "px";
  g.style.top = (y - 36) + "px";
}

function hideGhost() {
  const g = document.getElementById("drag-ghost");
  if (g) g.style.display = "none";
}

function handleDrop(slotIndex) {
  if (state.checked || !state.dragItem) return;

  const newSlots = [...state.slots];
  const newPool = [...state.pool];

  if (newSlots[slotIndex] !== null) {
    const existing = newSlots[slotIndex];
    if (state.dragSource?.type === "slot") {
      newSlots[state.dragSource.index] = existing;
    } else {
      newPool.push(existing);
    }
  }

  if (state.dragSource?.type === "slot") {
    if (!state.slots[slotIndex] || slotIndex === state.dragSource.index) {
      newSlots[state.dragSource.index] = null;
    }
  } else {
    const poolIdx = newPool.findIndex(p => p.id === state.dragItem.id);
    if (poolIdx > -1) newPool.splice(poolIdx, 1);
  }

  newSlots[slotIndex] = state.dragItem;
  state.slots = newSlots;
  state.pool = newPool;
}

function returnToPool(slotIdx) {
  if (state.checked) return;
  const item = state.slots[slotIdx];
  if (!item) return;
  state.slots[slotIdx] = null;
  state.pool.push(item);
  render();
}

function checkAnswers() {
  if (!allPlaced()) return;
  const r = state.slots.map((item, i) => item ? item.correctIndex === i : false);
  state.results = r;
  state.checked = true;
  const correct = r.filter(Boolean).length;
  state.score = correct;
  state.totalScore += correct;
  render();

  if (correct === 5) {
    const container = document.getElementById("confetti-container");
    if (container) container.innerHTML = confettiHTML();
    setTimeout(() => { if (container) container.innerHTML = ""; }, 2000);
  }

  // Animate slots
  setTimeout(() => {
    const slotEls = document.querySelectorAll(".slot");
    slotEls.forEach((el, i) => {
      if (r[i]) el.classList.add("anim-bounce");
      else el.classList.add("anim-shake");
    });
    setTimeout(() => {
      slotEls.forEach(el => { el.classList.remove("anim-bounce", "anim-shake"); });
    }, 600);
  }, 50);
}

function nextRound() {
  if (state.roundIndex < ROUNDS.length - 1) {
    state.roundIndex++;
    initRound(state.roundIndex);
    render();
  } else {
    state.screen = "end";
    render();
  }
}

function startGame() {
  state.screen = "game";
  state.roundIndex = 0;
  state.totalScore = 0;
  initRound(0);
  render();
}

function restart() {
  state.screen = "start";
  state.totalScore = 0;
  state.roundIndex = 0;
  render();
}

// Initial render
render();
</script>
</body>
